<fieldset class="fr-fieldset">
  <div class="fr-fieldset__element">
    <div class="fr-toggle fr-toggle--left">
      <input class="fr-toggle__input" data-attr="visible" type="checkbox" id="layout-legend-toggle-ID" 
        aria-controls="layout-legend-title-fieldset-ID layout-legend-lineHeight-input-ID layout-legend-item-list-ID layout-legend-item-action-ID">
      <label class="fr-toggle__label fr-text--bold" for="layout-legend-toggle-ID">
        Afficher la Légende
      </label>
    </div>
  </div>
</fieldset>
<fieldset class="fr-fieldset" id="layout-legend-title-fieldset-ID" aria-label="Titre de la légende" aria-describedby="layout-legend-title-fieldset-messages-ID">
  <div class="fr-fieldset__element">
    <div class="fr-input-group">
      <label class="fr-label" for="layout-legend-title-input-ID">
        Titre
      </label>
      <input class="fr-input" data-attr="title" type="text" id="layout-legend-title-input-ID">
    </div>
  </div>
  <div class="fr-messages-group" aria-live="assertive" id="layout-legend-title-fieldset-messages-ID"></div>
</fieldset>
<fieldset class="fr-fieldset" id="layout-legend-lineHeight-fieldset-ID" aria-label="Hauteur des lignes" aria-describedby="layout-legend-lineHeight-fieldset-messages-ID">
  <div class="fr-fieldset__element">
    <div class="fr-input-group">
      <label class="fr-label" for="layout-legend-lineHeight-input-ID">
        Hauteur des lignes :
      </label>
      <input class="fr-input" data-attr="lineHeight" type="number" id="layout-legend-lineHeight-input-ID">
    </div>
  </div>
  <div class="fr-messages-group" aria-live="assertive" id="layout-legend-title-lineHeight-messages-ID"></div>
</fieldset>
<fieldset class="legend-item-list" id="layout-legend-item-list-ID">
</fieldset>
<fieldset class="fr-fieldset" id="layout-legend-item-action-ID">
  <button type="button" class="add-item-btn fr-btn fr-btn--sm fr-icon-add-line fr-btn--icon-left fr-btn--tertiary-no-outline" title="Ajouter un symbole">
    Ajouter un symbole
  </button>
  <button type="button" class="add-title-btn fr-btn fr-btn--sm fr-icon-add-line fr-btn--icon-left fr-btn--tertiary-no-outline" title="Ajouter une section">
    Ajouter une section
  </button>
</fieldset>
